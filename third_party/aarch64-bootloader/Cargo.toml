
cargo-features = ["profile-rustflags"]
[package]
name = "aarch64-bootloader"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "kernel"
path = "src/main.rs"

[features]

[dependencies]

[lints.rust]
unused_must_use = "deny"

implib = "0.4"
[profile.dev]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
debug = true

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
debug = false
